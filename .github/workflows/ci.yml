name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate release
        run: npm run validate:release

      - name: Validate mobile safety
        run: npm run validate:mobile-safety

      - name: Audit
        run: npm audit --audit-level=high

      - name: Package release
        run: npm run package:release
